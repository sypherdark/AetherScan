# Perception Pipeline Parameters
point_cloud_processor:
  ros__parameters:
    voxel_size: 0.03
    statistical_outlier_neighbors: 20
    statistical_outlier_stddev: 2.0
    min_height: -0.1
    max_height: 4.0
    process_rate: 5.0

mesh_reconstructor:
  ros__parameters:
    reconstruction_interval: 30.0
    min_points_for_mesh: 10000
    export_directory: "/tmp/aetherscan_meshes"
    voxel_size: 0.05
