# Flight Controller Parameters
flight_controller:
  ros__parameters:
    pos_kp: 1.2
    pos_ki: 0.05
    pos_kd: 0.4
    alt_kp: 1.5
    alt_ki: 0.1
    alt_kd: 0.5
    yaw_kp: 1.0
    yaw_ki: 0.0
    yaw_kd: 0.2
    max_horizontal_vel: 1.5
    max_vertical_vel: 0.5
    max_yaw_rate: 1.0
    control_rate: 50.0
    position_tolerance: 0.1

trajectory_tracker:
  ros__parameters:
    cruise_speed: 0.8
    approach_speed: 0.3
    waypoint_reach_threshold: 0.4
    lookahead_distance: 1.0
    tracking_rate: 20.0
